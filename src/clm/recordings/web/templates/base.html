<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CLM Recordings{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"
            integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
            crossorigin="anonymous"></script>
    <style>
        :root {
            --pico-font-size: 16px;
        }
        .status-badge {
            display: inline-block;
            padding: 0.2em 0.6em;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .badge-idle { background: #6b7280; color: white; }
        .badge-armed { background: #2563eb; color: white; }
        .badge-recording { background: #dc2626; color: white; }
        .badge-renaming { background: #d97706; color: white; }
        .badge-connected { background: #16a34a; color: white; }
        .badge-disconnected { background: #9ca3af; color: white; }
        .badge-reconnecting { background: #f59e0b; color: white; }
        .badge-no_recording { background: #e5e7eb; color: #4b5563; }
        .badge-recorded { background: #f59e0b; color: #78350f; }
        .badge-ready { background: #34d399; color: #064e3b; }
        .badge-completed { background: #16a34a; color: white; }
        .badge-failed { background: #ef4444; color: white; }
        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 0.75em 1em;
            border-radius: 6px;
            margin-bottom: 1em;
        }
        .armed-info {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            padding: 0.75em 1em;
            border-radius: 6px;
            margin-bottom: 1em;
        }
        .obs-banner {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            color: #78350f;
            padding: 0.75em 1em;
            border-radius: 6px;
            margin-bottom: 1em;
        }
        .topic-btn {
            font-size: 0.85em;
            padding: 0.3em 0.8em;
        }
        /* Override PicoCSS defaults inside lecture table action cells */
        .deck-actions {
            display: flex;
            align-items: center;
            gap: 0.4em;
            justify-content: flex-end;
            flex-wrap: nowrap;
        }
        .deck-actions form {
            display: inline-flex;
            align-items: center;
            gap: 0.3em;
            margin: 0;
        }
        .deck-actions label,
        .deck-actions input,
        .deck-actions button {
            display: inline-block;
            width: auto;
            margin-bottom: 0;
        }
        .deck-actions input[type="number"] {
            width: 3.5em;
            padding: 0.2em 0.3em;
            font-size: 0.85em;
        }
        .deck-actions label {
            font-size: 0.8em;
        }
        /* Armed deck row highlight — override PicoCSS td backgrounds */
        table tbody tr.row-armed td {
            background-color: #dbeafe;
        }
        .badge-processing { background: #8b5cf6; color: white; }
        nav ul li strong {
            color: var(--pico-primary);
        }
    </style>
</head>
<body>
    <nav class="container-fluid">
        <ul>
            <li><strong>CLM Recordings</strong></li>
        </ul>
        <ul>
            <li><a href="/">Dashboard</a></li>
            <li><a href="/lectures">Lectures</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer class="container">
        <small>CLM Recordings Dashboard</small>
    </footer>
    <script>
    // Global SSE bridge. Replaces htmx-ext-sse because the extension's
    // event dispatch doesn't reach descendants of the sse-connect root,
    // so hx-trigger="sse:status" on nested elements never fired.
    //
    // Any element that wants to react to an SSE event declares it via
    //   data-sse-refresh="<event-name> [<event-name> ...]"
    // On receipt, we call htmx.trigger(el, 'sse:<event-name>') so the
    // element's hx-trigger listener fires — same mental model as the
    // htmx-sse extension, just with explicit control over which elements
    // see each event.
    (function () {
        var source = new EventSource('/events');
        var eventNames = ['status', 'job'];
        eventNames.forEach(function (name) {
            source.addEventListener(name, function () {
                var selector = '[data-sse-refresh~="' + name + '"]';
                document.querySelectorAll(selector).forEach(function (el) {
                    window.htmx.trigger(el, 'sse:' + name);
                });
            });
        });
        window.addEventListener('pagehide', function () { source.close(); });
    })();
    </script>
</body>
</html>
