<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}CLM Recordings{% endblock %}</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <nav class="nav">
        <span class="nav-brand">CLM Recordings</span>
        <ul class="nav-links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/lectures">Lectures</a></li>
        </ul>
    </nav>

    {# Toasts: the notice SSE topic pushes into #toast-region via the
       bridge below. The region itself is rendered empty — JS constructs
       each toast node on the fly. #}
    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="false"></div>

    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <small>CLM Recordings Dashboard</small>
    </footer>

    <script>
    /* Spinner affordance on htmx request lifecycle. Any submit button
       inside an hx-* form gets `.is-busy` for the duration of its
       request — CSS renders the spinner overlay. */
    document.addEventListener('htmx:beforeRequest', function (evt) {
        var btn = evt.detail.elt.querySelector('button[type="submit"], button:not([type])');
        if (btn) btn.classList.add('is-busy');
    });
    document.addEventListener('htmx:afterRequest', function (evt) {
        var root = evt.detail.elt;
        if (!root) return;
        root.querySelectorAll('.is-busy').forEach(function (el) {
            el.classList.remove('is-busy');
        });
    });

    /* Per-deck chip selection.
       Replaces the old <input name="part_number"> + snapshot/restore
       dance. Selection state lives in sessionStorage keyed by
       "<course>::<section>::<deck>" so it survives every htmx swap
       (including hx-target="body" full re-renders), and the
       chip strip just rehydrates from storage on every render.
       Action buttons consume the selection by reading the chip's
       data-part and writing it into the form's hidden part_number
       input right before submit. */
    var CHIP_STORAGE_PREFIX = 'clm:chipSel:';
    function _readChipSelection(key) {
        try { return sessionStorage.getItem(CHIP_STORAGE_PREFIX + key); }
        catch (e) { return null; }
    }
    function _writeChipSelection(key, part) {
        try { sessionStorage.setItem(CHIP_STORAGE_PREFIX + key, String(part)); }
        catch (e) { /* private browsing / quota exceeded — ignore */ }
    }
    function _applyChipSelectionToRow(strip, selectedPart, isExisting) {
        strip.querySelectorAll('[data-chip]').forEach(function (chip) {
            var match = String(chip.getAttribute('data-part')) === String(selectedPart)
                && (chip.hasAttribute('data-chip-next') ? !isExisting : isExisting);
            chip.classList.toggle('chip-selected', match);
            chip.setAttribute('aria-pressed', match ? 'true' : 'false');
        });
        var row = strip.closest('[data-deck-row]');
        if (!row) return;
        // Mirror selection into the action forms' hidden part_number
        // inputs so submit POSTs the right value.
        row.querySelectorAll('[data-part-input]').forEach(function (input) {
            input.value = String(selectedPart);
        });
        // Mirror selection into the per-chip Process form so the
        // selected chip's raw_path is what gets submitted.
        var processForm = row.querySelector('[data-process-form]');
        if (processForm) {
            var perPart = processForm.querySelector('[data-raw-path-for="' + selectedPart + '"]');
            var rawInput = processForm.querySelector('[data-raw-input]');
            if (rawInput && perPart) {
                rawInput.value = perPart.value;
            }
        }
        // Swap Record/Arm button labels to Retake/Re-arm when an
        // existing chip is selected; show the warning icon.
        var warningEl = row.querySelector('[data-retake-warning]');
        if (warningEl) {
            warningEl.hidden = !isExisting;
        }
        row.querySelectorAll('[data-action-label-fresh]').forEach(function (el) {
            el.hidden = isExisting;
        });
        row.querySelectorAll('[data-action-label-retake]').forEach(function (el) {
            el.hidden = !isExisting;
        });
    }
    function _hydrateChipStrip(strip) {
        if (!strip) return;
        var key = strip.getAttribute('data-deck-key');
        var defaultPart = strip.getAttribute('data-default-part') || '0';
        var stored = _readChipSelection(key);
        // Validate stored selection against the current chips —
        // otherwise a deleted part leaves the row pointing nowhere.
        var validParts = {};
        var nextPart = null;
        strip.querySelectorAll('[data-chip]').forEach(function (chip) {
            var p = chip.getAttribute('data-part');
            if (chip.hasAttribute('data-chip-next')) {
                nextPart = p;
            } else {
                validParts[p] = true;
            }
        });
        var selected;
        var isExisting;
        if (stored !== null && validParts[stored]) {
            selected = stored;
            isExisting = true;
        } else {
            // Default = next-part chip (Q3 in the design).
            selected = nextPart != null ? nextPart : defaultPart;
            isExisting = false;
        }
        _applyChipSelectionToRow(strip, selected, isExisting);
    }
    function _hydrateAllChipStrips(scope) {
        var root = scope || document;
        root.querySelectorAll('[data-chip-strip]').forEach(_hydrateChipStrip);
    }
    // Single document-level click delegate — chip elements come and
    // go on every htmx swap, so per-element listeners would leak.
    document.addEventListener('click', function (evt) {
        // Take-history close button.
        var closeBtn = evt.target.closest('[data-takes-close]');
        if (closeBtn) {
            evt.preventDefault();
            var panel = closeBtn.closest('.takes-row');
            if (panel) panel.remove();
            return;
        }
        var chip = evt.target.closest('[data-chip]');
        if (!chip) return;
        var strip = chip.closest('[data-chip-strip]');
        if (!strip) return;
        // Armed strip: selection is locked.
        if (strip.hasAttribute('data-armed-part')) return;
        var part = chip.getAttribute('data-part');
        var isExisting = !chip.hasAttribute('data-chip-next');
        var key = strip.getAttribute('data-deck-key');
        if (isExisting) {
            _writeChipSelection(key, part);
        } else {
            // Selecting "next part" clears the stored selection so the
            // row defaults back to next-part on the next render.
            try { sessionStorage.removeItem(CHIP_STORAGE_PREFIX + key); }
            catch (e) { /* ignore */ }
        }
        _applyChipSelectionToRow(strip, part, isExisting);
    });
    // ARIA tablist: arrow keys move focus inside a chip strip.
    document.addEventListener('keydown', function (evt) {
        if (evt.key !== 'ArrowLeft' && evt.key !== 'ArrowRight') return;
        var chip = evt.target.closest('[data-chip]');
        if (!chip) return;
        var strip = chip.closest('[data-chip-strip]');
        if (!strip) return;
        var chips = Array.prototype.slice.call(strip.querySelectorAll('[data-chip]'));
        var idx = chips.indexOf(chip);
        if (idx < 0) return;
        evt.preventDefault();
        var next = evt.key === 'ArrowLeft'
            ? chips[(idx - 1 + chips.length) % chips.length]
            : chips[(idx + 1) % chips.length];
        if (next) next.focus();
    });
    // Auto-advance bookkeeping: when the user selects "next part",
    // the chip they clicked becomes an existing part on the next
    // render. To honor "sticky except when selection was next-part,
    // re-target the new next-part" (Q3), the next-part path above
    // already removes storage so re-render defaults back to next.
    document.addEventListener('htmx:afterSwap', function () {
        _hydrateAllChipStrips();
    });
    document.addEventListener('DOMContentLoaded', function () {
        _hydrateAllChipStrips();
    });

    /* Collapsible-section persistence.
       Each <details data-section-collapse> remembers its open/closed
       state in sessionStorage keyed by section name, so the frequent
       SSE-driven #lectures-dynamic swaps (which re-render every section
       as `open`) don't undo a section the user collapsed. Restoration
       runs synchronously inside htmx:afterSwap — before the browser
       paints the freshly-swapped subtree — so a collapsed section never
       flashes open. `toggle` doesn't bubble, so the listener is attached
       in the capture phase to catch it from the document root. */
    var SECTION_STORAGE_PREFIX = 'clm:sectionOpen:';
    function _restoreSectionCollapse(scope) {
        var root = scope || document;
        root.querySelectorAll('[data-section-collapse]').forEach(function (d) {
            var key = d.getAttribute('data-section-key');
            if (!key) return;
            var stored;
            try { stored = sessionStorage.getItem(SECTION_STORAGE_PREFIX + key); }
            catch (e) { stored = null; }
            if (stored === 'closed') d.removeAttribute('open');
            else if (stored === 'open') d.setAttribute('open', '');
        });
    }
    document.addEventListener('toggle', function (evt) {
        var d = evt.target;
        if (!d || !d.hasAttribute || !d.hasAttribute('data-section-collapse')) return;
        var key = d.getAttribute('data-section-key');
        if (!key) return;
        try {
            sessionStorage.setItem(SECTION_STORAGE_PREFIX + key, d.open ? 'open' : 'closed');
        } catch (e) { /* private browsing / quota exceeded — ignore */ }
    }, true);
    document.addEventListener('htmx:afterSwap', function () {
        _restoreSectionCollapse();
    });
    document.addEventListener('DOMContentLoaded', function () {
        _restoreSectionCollapse();
    });

    /* Elapsed-time ticker.
       Any element carrying `data-elapsed-base-seconds="N"` is anchored
       on render (we capture Date.now() at anchor time) and re-rendered
       every second as `mm:ss` using `N + (now - anchor)/1000`.
       New swaps reset the anchor from the fresh server value, so any
       drift gets corrected on the next SSE refresh without server-side
       per-second chatter. */
    function _formatElapsed(totalSeconds) {
        totalSeconds = Math.max(0, Math.floor(totalSeconds));
        var m = Math.floor(totalSeconds / 60);
        var s = totalSeconds % 60;
        return m + ':' + (s < 10 ? '0' : '') + s;
    }
    function _tickElapsedTimers() {
        var now = Date.now();
        document.querySelectorAll('.elapsed-timer[data-elapsed-base-seconds]').forEach(function (el) {
            var base = parseInt(el.getAttribute('data-elapsed-base-seconds'), 10);
            if (isNaN(base)) return;
            /* When the session is paused the server renders a frozen
               base value and sets `data-elapsed-paused`; just display it
               without advancing so the timer does not tick. */
            if (el.hasAttribute('data-elapsed-paused')) {
                el.textContent = _formatElapsed(base);
                return;
            }
            var anchor = el._elapsedAnchor;
            if (anchor == null) {
                el._elapsedAnchor = now;
                anchor = now;
            }
            var seconds = base + (now - anchor) / 1000;
            el.textContent = _formatElapsed(seconds);
        });
    }
    setInterval(_tickElapsedTimers, 1000);
    /* Reset each timer's anchor after an htmx swap so the fresh server
       value takes effect immediately instead of continuing to tick from
       the previous anchor. */
    document.addEventListener('htmx:afterSwap', function () {
        document.querySelectorAll('.elapsed-timer[data-elapsed-base-seconds]').forEach(function (el) {
            el._elapsedAnchor = null;
        });
        _tickElapsedTimers();
    });

    /* Toast construction helper. Adds a dismissible toast node and
       auto-removes after `ttl` ms (default 6000). */
    function showToast(message, level, ttl) {
        var region = document.getElementById('toast-region');
        if (!region) return;
        var toast = document.createElement('div');
        toast.className = 'toast toast-' + (level || 'info');
        toast.setAttribute('role', level === 'error' ? 'alert' : 'status');
        toast.textContent = message;
        var close = document.createElement('button');
        close.className = 'toast-dismiss';
        close.type = 'button';
        close.setAttribute('aria-label', 'Dismiss');
        close.innerHTML = '&times;';
        close.addEventListener('click', function () { toast.remove(); });
        toast.appendChild(close);
        region.appendChild(toast);
        var lifetime = ttl == null ? 6000 : ttl;
        if (lifetime > 0) {
            setTimeout(function () { toast.remove(); }, lifetime);
        }
    }
    window.clmShowToast = showToast;

    /* SSE bridge. Replaces htmx-ext-sse because the extension's event
       dispatch doesn't reach descendants of the sse-connect root, so
       hx-trigger="sse:status" on nested elements never fired.
       Any element that wants to react declares it via
         data-sse-refresh="<event> [<event> ...]"
       On receipt we call htmx.trigger(el, 'sse:<event>') — same mental
       model as the extension, with explicit routing.
       `notice` is special: payload is `level|message` and we route it
       straight to showToast() instead of an htmx trigger. */
    (function () {
        var source = new EventSource('/events');
        var htmxEventNames = ['status', 'job'];
        htmxEventNames.forEach(function (name) {
            source.addEventListener(name, function () {
                var selector = '[data-sse-refresh~="' + name + '"]';
                document.querySelectorAll(selector).forEach(function (el) {
                    window.htmx.trigger(el, 'sse:' + name);
                });
            });
        });
        source.addEventListener('notice', function (evt) {
            /* Payload format: "<level>|<message>" — pipe-delimited to
               avoid JSON parsing in the event stream. */
            var raw = evt.data || '';
            var sep = raw.indexOf('|');
            var level = sep >= 0 ? raw.slice(0, sep) : 'info';
            var msg = sep >= 0 ? raw.slice(sep + 1) : raw;
            showToast(msg, level);
        });
        window.addEventListener('pagehide', function () { source.close(); });
    })();

    /* Keyboard affordances.
       • Escape: closes an open take-history panel that contains
         focus, otherwise disarms an armed deck if one is armed.
         Ignored while an input/textarea is focused and has text, to
         avoid stealing field-reset Escape. */
    document.addEventListener('keydown', function (evt) {
        if (evt.key !== 'Escape') return;
        if (evt.target && /^(INPUT|TEXTAREA|SELECT)$/.test(evt.target.tagName)) {
            if (evt.target.value) return;
        }
        // Close-on-Escape: only the take panel that contains focus.
        var openPanel = evt.target.closest && evt.target.closest('.takes-row');
        if (openPanel) {
            evt.preventDefault();
            openPanel.remove();
            return;
        }
        var disarm = document.querySelector('[data-disarm-shortcut]');
        if (disarm) {
            evt.preventDefault();
            disarm.click();
        }
    });

    /* Restore-take button: two-step morph.
       First click on a `.btn-restore` swaps the button into a confirm
       state (text → "Confirm restore", `.btn-restore-confirm` class
       added). A second click commits via HTMX POST. Clicking elsewhere
       or pressing Escape cancels. The success path shows a toast via
       the existing notice SSE bridge — the restore route calls
       `_push_notice("success", ...)` which arrives as an SSE event. */
    function _resetRestoreButtons(except) {
        document.querySelectorAll('.btn-restore.btn-restore-confirm').forEach(function (btn) {
            if (btn === except) return;
            btn.classList.remove('btn-restore-confirm');
            var idle = btn.querySelector('[data-restore-label-idle]');
            var confirm = btn.querySelector('[data-restore-label-confirm]');
            if (idle) idle.hidden = false;
            if (confirm) confirm.hidden = true;
        });
    }
    document.addEventListener('click', function (evt) {
        var btn = evt.target.closest('.btn-restore');
        if (!btn) {
            _resetRestoreButtons(null);
            return;
        }
        if (btn.disabled) return;
        evt.preventDefault();
        if (btn.classList.contains('btn-restore-confirm')) {
            // Second click — commit.
            var url = btn.getAttribute('data-restore-url');
            if (!url || !window.htmx) return;
            window.htmx.ajax('POST', url, {
                source: btn,
                target: 'body',
                swap: 'none'
            });
            _resetRestoreButtons(null);
        } else {
            // First click — morph to confirm. Reset other confirming buttons.
            _resetRestoreButtons(btn);
            btn.classList.add('btn-restore-confirm');
            var idle = btn.querySelector('[data-restore-label-idle]');
            var confirm = btn.querySelector('[data-restore-label-confirm]');
            if (idle) idle.hidden = true;
            if (confirm) confirm.hidden = false;
            btn.focus();
        }
    });
    document.addEventListener('keydown', function (evt) {
        if (evt.key === 'Escape') {
            _resetRestoreButtons(null);
        }
    });

    /* Take-history reveal: right-click a chip to toggle the inline
       panel below the deck row. Lazy-fetched from
       GET /decks/{course}/{section}/{deck}/takes. */
    document.addEventListener('contextmenu', function (evt) {
        var chip = evt.target.closest('[data-chip]');
        if (!chip) return;
        if (chip.hasAttribute('data-chip-next')) return;
        var strip = chip.closest('[data-chip-strip]');
        var row = chip.closest('[data-deck-row]');
        if (!strip || !row) return;
        evt.preventDefault();
        var part = chip.getAttribute('data-part');
        var key = strip.getAttribute('data-deck-key');
        // Toggle: if a panel for the same (deck, part) is already
        // open, close it instead of fetching again.
        var existing = document.querySelector(
            '[data-takes-panel][data-deck-key="' + key + '"][data-part="' + part + '"]'
        );
        if (existing) {
            existing.remove();
            return;
        }
        // Parse "<course>::<section>::<deck>" — colons inside the
        // names themselves are sanitized out by sanitize_file_name
        // before render so the simple split is safe.
        var parts = key.split('::');
        if (parts.length !== 3) return;
        var url = '/decks/' + encodeURIComponent(parts[0])
            + '/' + encodeURIComponent(parts[1])
            + '/' + encodeURIComponent(parts[2])
            + '/takes?part=' + encodeURIComponent(part);
        if (window.htmx) {
            window.htmx.ajax('GET', url, {
                target: row,
                swap: 'afterend'
            });
        }
    });
    </script>
</body>
</html>
