{% if pairs %}
<section class="card">
    <div class="card-header">
        <h3 class="card-title">Pending Pairs ({{ pairs|length }})</h3>
    </div>
    <table>
        <thead>
            <tr>
                <th>Directory</th>
                <th>Topic</th>
                <th>Video</th>
                <th>Audio</th>
            </tr>
        </thead>
        <tbody>
            {% for pair in pairs %}
            <tr>
                <td>{{ pair.relative_dir }}</td>
                <td>{{ pair.base_name }}</td>
                <td><code>{{ pair.video.name }}</code></td>
                <td><code>{{ pair.audio.name }}</code></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</section>
{% else %}
<section class="card">
    <div class="card-header"><h3 class="card-title">Pending Pairs</h3></div>
    <p><small>No video + audio pairs ready for assembly.</small></p>
</section>
{% endif %}
