<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>{% block title %}CLM Deck Editor{% endblock %}</title>
    <link rel="stylesheet" href="/static/edit.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <nav class="nav">
        <a class="nav-brand" href="/">‹ Decks</a>
        <span class="nav-title">{% block nav_title %}{% endblock %}</span>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <small>CLM Deck Editor — edits write straight to disk · use git as your safety net</small>
    </footer>

    <script>
    // Indicate a busy button during an htmx request so taps feel responsive.
    document.addEventListener('htmx:beforeRequest', function (evt) {
        var btn = evt.detail.elt.querySelector('button[type="submit"], button:not([type])');
        if (btn) { btn.classList.add('is-busy'); btn.disabled = true; }
    });
    document.addEventListener('htmx:afterRequest', function (evt) {
        var root = evt.detail.elt;
        if (!root) return;
        root.querySelectorAll('.is-busy').forEach(function (el) {
            el.classList.remove('is-busy'); el.disabled = false;
        });
    });
    </script>
</body>
</html>
