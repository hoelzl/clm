      code: 200
      message: OK
- request:
    body: ''
    headers: {}
    method: GET
    uri: https://example.com/gzip
  response:
    body:
      string: 'hello compressed world hello compressed world hello compressed world
        hello compressed world hello compressed world hello compressed world hello
        compressed world hello compressed world hello compressed world hello compressed
        world '
    headers:
      content-length:
      - '230'
      content-type:
      - text/plain
    status:
      code: 200
      message: OK
- request:
    body: ''
    headers: {}
    method: GET
    uri: https://example.com/crlf
  response:
    body:
      string: "line1\r\nline2\nline3"
    headers: {}
