interactions:
- request:
    body: ''
    headers:
      accept:
      - '*/*'
      user-agent:
      - python-requests/2.32
    method: GET
    uri: https://restcountries.com/v3.1/name/germany
  response:
    body:
      string: '[{"name":"Germany"}]'
    headers:
      content-type:
      - application/json
    status:
      code: 200
      message: OK
- request:
    body: '{"messages":[{"role":"user","content":"hi"}],"stream":false}'
    headers:
      content-type:
      - application/json
    method: POST
    uri: https://api.example.com/v1/chat/completions
  response:
    body:
      string: "{\"choices\":[{\"text\":\"h\xE4llo w\xF6rld \u2603\"}]}"
    headers:
      content-type:
      - application/json
      set-cookie:
      - a=1
      - b=2
    status:
      code: 200
      message: null
- request:
    body: ''
    headers: {}
    method: GET
    uri: http://example.com:8080/binary
  response:
    body:
      string: !!binary |
        AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8gISIjJCUmJygpKissLS4vMDEyMzQ1Njc4
        OTo7PD0+P0BBQkNERUZHSElKS0xNTk9QUVJTVFVWV1hZWltcXV5fYGFiY2RlZmdoaWprbG1ub3Bx
        cnN0dXZ3eHl6e3x9fn+AgYKDhIWGh4iJiouMjY6PkJGSk5SVlpeYmZqbnJ2en6ChoqOkpaanqKmq
        q6ytrq+wsbKztLW2t7i5uru8vb6/wMHCw8TFxsfIycrLzM3Oz9DR0tPU1dbX2Nna29zd3t/g4eLj
        5OXm5+jp6uvs7e7v8PHy8/T19vf4+fr7/P3+/w==
