name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  # Detect whether the change touches anything that warrants running the full
  # test/lint/docker pipeline. Docs-only changes (design notes, READMEs,
  # changelog fragments) skip the expensive jobs to save CI minutes.
  #
  # IMPORTANT: "Test on Python 3.12", "Test on Python 3.13" and
  # "Lint and type check" are *required* status checks (see the "Require CI
  # green" ruleset). A required check that never reports leaves the PR stuck
  # "Expected — waiting for status". So those jobs must always RUN and report
  # success — we gate their individual steps on ``needs.changes.outputs.code``
  # rather than skipping the whole job. The non-required docker job may be
  # skipped wholesale.
  #
  # The doc-only globs are deliberately narrow: ``src/clm/cli/info_topics/*.md``
  # and other markdown shipped under ``src/`` are covered by tests, so a blanket
  # ``**/*.md`` would wrongly skip CI for them. Only ``docs/``, ``changelog.d/``
  # and top-level ``*.md`` count as docs-only.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          lfs: false
      - name: Filter paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          # ``code`` is true when at least one changed file is NOT docs-only.
          #
          # ``predicate-quantifier: every`` is essential: by default a file
          # matches a filter when it matches ANY listed pattern, and every file
          # matches at least one of these negations (nothing is simultaneously
          # under docs/, under changelog.d/ AND a top-level *.md), which made
          # ``code`` always true and ran the full pipeline for docs-only
          # changes. With ``every``, a file counts as code only when it matches
          # ALL negations, i.e. is none of the docs-only locations.
          predicate-quantifier: every
          filters: |
            code:
              - '!docs/**'
              - '!changelog.d/**'
              - '!*.md'

  test:
    name: Test on Python ${{ matrix.python-version }}
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        lfs: false

    # The non-docker test suite needs only the small fixture/template images,
    # not the docker/ build inputs. Pulling only what we need (and excluding
    # docker/**) keeps LFS bandwidth down and guards against any large binary
    # ever re-landing under docker/ silently inflating every CI run.
    - name: Pull LFS test fixtures (excluding docker build inputs)
      if: needs.changes.outputs.code == 'true'
      run: git lfs pull --exclude="docker/**"

    - name: Set up Python ${{ matrix.python-version }}
      if: needs.changes.outputs.code == 'true'
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Java for PlantUML
      if: needs.changes.outputs.code == 'true'
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      if: needs.changes.outputs.code == 'true'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libdrm2 libgbm1 libxcb-dri3-0

    - name: Install PlantUML
      if: needs.changes.outputs.code == 'true'
      run: |
        wget -O plantuml.jar https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml-1.2024.6.jar
        echo "PLANTUML_JAR=$PWD/plantuml.jar" >> $GITHUB_ENV

    - name: Install DrawIO
      if: needs.changes.outputs.code == 'true'
      run: |
        # Download DrawIO from GitHub releases
        wget -O drawio.deb https://github.com/jgraph/drawio-desktop/releases/download/v24.7.17/drawio-amd64-24.7.17.deb
        sudo dpkg -i drawio.deb || sudo apt-get install -f -y
        echo "DRAWIO_EXECUTABLE=/opt/drawio/drawio" >> $GITHUB_ENV

    - name: Install uv
      if: needs.changes.outputs.code == 'true'
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Install dependencies
      if: needs.changes.outputs.code == 'true'
      run: |
        # Install the EXACT versions from uv.lock so CI matches a developer's
        # local `uv sync` (issue #516 follow-up: the old fresh `uv pip install`
        # resolved a different Click than the lock, hiding environment drift).
        # `--frozen` (not `--locked`): install the lock as-is without a freshness
        # re-check — the `[tool.uv].exclude-newer` bare date normalizes to a
        # slightly different timestamp across uv versions, which would make
        # `--locked` spuriously reject an otherwise-valid lock. Same extra set as
        # before via explicit `--extra` + `--no-default-groups` (the `dev` extra
        # carries the pytest stack), so the only change is the version source.
        # `replay` keeps the HTTP-replay cassette tests running instead of
        # importorskip-skipping. ML/jupyterlite stay out by design.
        uv sync --frozen --python ${{ matrix.python-version }} --no-default-groups \
          --extra all-workers --extra summarize --extra recordings --extra slides \
          --extra mcp --extra replay --extra dev --extra tui --extra web

    - name: Start Xvfb
      if: needs.changes.outputs.code == 'true'
      run: |
        Xvfb :99 -screen 0 1024x768x24 -ac +extension GLX +render -noreset &
        echo "DISPLAY=:99" >> $GITHUB_ENV
        sleep 2

    - name: Verify external tools
      if: needs.changes.outputs.code == 'true'
      run: |
        echo "Checking Java..."
        java -version
        echo "Checking PlantUML..."
        java -jar $PLANTUML_JAR -version
        echo "Checking DrawIO..."
        ls -la $DRAWIO_EXECUTABLE
        echo "Checking DISPLAY..."
        echo $DISPLAY
        echo "Checking Xvfb..."
        pgrep -x Xvfb

    - name: Configure git identity for tests
      if: needs.changes.outputs.code == 'true'
      run: |
        git config --global user.email "ci@github.actions"
        git config --global user.name "GitHub Actions CI"

    - name: Run unit tests
      if: needs.changes.outputs.code == 'true'
      run: |
        uv run --no-sync pytest -v -m "not slow and not integration and not e2e and not docker" --timeout=120 --cov=src/clm --cov-report=xml --cov-report=term

    - name: Run integration tests
      if: needs.changes.outputs.code == 'true'
      run: |
        uv run --no-sync pytest -v -m "integration and not docker and not slow" --timeout=240 --log-cli-level=INFO --cov=src/clm --cov-append --cov-report=xml --cov-report=term
      env:
        CLM_ENABLE_TEST_LOGGING: "1"
        CLM_LOG_LEVEL: INFO

    - name: Run E2E tests
      if: needs.changes.outputs.code == 'true'
      run: |
        uv run --no-sync pytest -v -m "e2e and not docker and not slow" --timeout=600 --log-cli-level=INFO --cov=src/clm --cov-append --cov-report=xml --cov-report=term
      env:
        CLM_E2E_TIMEOUT: 600  # 10 minutes timeout for E2E tests (allows multi-build tests)
        CLM_ENABLE_TEST_LOGGING: "1"
        CLM_LOG_LEVEL: INFO

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      continue-on-error: true
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
      if: needs.changes.outputs.code == 'true' && matrix.python-version == '3.12'

  lint:
    name: Lint and type check
    needs: changes
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Set up Python
      if: needs.changes.outputs.code == 'true'
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install uv
      if: needs.changes.outputs.code == 'true'
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Install dependencies
      if: needs.changes.outputs.code == 'true'
      run: |
        # From the lockfile (see the test job; `--frozen` for the same reason),
        # same extra set as before so lint/type-check sees the exact versions
        # developers do. The `dev` extra carries ruff + mypy; the worker extras
        # give mypy the imports to resolve.
        uv sync --frozen --python 3.12 --no-default-groups \
          --extra dev --extra tui --extra web --extra notebook --extra summarize \
          --extra recordings --extra slides --extra mcp

    - name: Run ruff check
      if: needs.changes.outputs.code == 'true'
      run: |
        uv run --no-sync ruff check src/ tests/

    - name: Run ruff format check
      if: needs.changes.outputs.code == 'true'
      run: |
        uv run --no-sync ruff format --check src/ tests/

    - name: Run mypy
      if: needs.changes.outputs.code == 'true'
      run: |
        uv run --no-sync mypy src/clm

  docker-test:
    name: Docker Integration Tests
    needs: changes
    # Not a required status check, so it is safe to skip the whole job for
    # docs-only changes.
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    # The notebook/plantuml/drawio build inputs (deno, ijava, drawio .deb) are
    # now fetched + SHA-256-verified inside the Dockerfiles, so the only LFS
    # object the image builds need is the small drawio font.
    - name: Checkout code
      uses: actions/checkout@v7
      with:
        lfs: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build notebook-processor:lite-test Docker image
      run: |
        docker build \
          -f docker/notebook/Dockerfile \
          --build-arg VARIANT=lite \
          --build-arg DOCKER_PATH=docker/notebook \
          -t clm-notebook-processor:lite-test \
          .

    - name: Build plantuml-converter:test Docker image
      run: |
        docker build \
          -f docker/plantuml/Dockerfile \
          --build-arg DOCKER_PATH=docker/plantuml \
          -t clm-plantuml-converter:test \
          .

    - name: Build drawio-converter:test Docker image
      run: |
        docker build \
          -f docker/drawio/Dockerfile \
          --build-arg DOCKER_PATH=docker/drawio \
          -t clm-drawio-converter:test \
          .

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        # From the lockfile (see the test job; `--frozen` for the same reason),
        # same extra set as before.
        uv sync --frozen --python 3.12 --no-default-groups \
          --extra all-workers --extra recordings --extra dev --extra tui --extra web

    - name: Run Docker integration tests
      run: |
        uv run --no-sync pytest -v -n0 -m "docker" --timeout=600 --log-cli-level=INFO
      env:
        CLM_E2E_TIMEOUT: 600
        CLM_ENABLE_TEST_LOGGING: "1"
        CLM_LOG_LEVEL: INFO
