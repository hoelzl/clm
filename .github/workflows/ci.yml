name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        lfs: false

    # The non-docker test suite needs only the small fixture/template images,
    # not the docker/ build inputs. Pulling only what we need (and excluding
    # docker/**) keeps LFS bandwidth down and guards against any large binary
    # ever re-landing under docker/ silently inflating every CI run.
    - name: Pull LFS test fixtures (excluding docker build inputs)
      run: git lfs pull --exclude="docker/**"

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up Java for PlantUML
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xdg-utils libatspi2.0-0 libdrm2 libgbm1 libxcb-dri3-0

    - name: Install PlantUML
      run: |
        wget -O plantuml.jar https://github.com/plantuml/plantuml/releases/download/v1.2024.6/plantuml-1.2024.6.jar
        echo "PLANTUML_JAR=$PWD/plantuml.jar" >> $GITHUB_ENV

    - name: Install DrawIO
      run: |
        # Download DrawIO from GitHub releases
        wget -O drawio.deb https://github.com/jgraph/drawio-desktop/releases/download/v24.7.17/drawio-amd64-24.7.17.deb
        sudo dpkg -i drawio.deb || sudo apt-get install -f -y
        echo "DRAWIO_EXECUTABLE=/opt/drawio/drawio" >> $GITHUB_ENV

    - name: Install uv
      uses: astral-sh/setup-uv@v8
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        # Install all dependencies except ML (PyTorch, FastAI, etc.) which aren't needed for tests.
        # ``replay`` (vcrpy + filelock) is included so the HTTP-replay tests -- including the
        # issue #143 pin-guard / upstream-drift detector -- actually run in CI instead of being
        # skipped by ``pytest.importorskip("vcr")``.
        uv pip install --system -e ".[all-workers,summarize,recordings,slides,mcp,replay,dev,tui,web]"

    - name: Start Xvfb
      run: |
        Xvfb :99 -screen 0 1024x768x24 -ac +extension GLX +render -noreset &
        echo "DISPLAY=:99" >> $GITHUB_ENV
        sleep 2

    - name: Verify external tools
      run: |
        echo "Checking Java..."
        java -version
        echo "Checking PlantUML..."
        java -jar $PLANTUML_JAR -version
        echo "Checking DrawIO..."
        ls -la $DRAWIO_EXECUTABLE
        echo "Checking DISPLAY..."
        echo $DISPLAY
        echo "Checking Xvfb..."
        pgrep -x Xvfb

    - name: Configure git identity for tests
      run: |
        git config --global user.email "ci@github.actions"
        git config --global user.name "GitHub Actions CI"

    - name: Run unit tests
      run: |
        pytest -v -m "not slow and not integration and not e2e and not docker" --timeout=120 --cov=src/clm --cov-report=xml --cov-report=term

    - name: Run integration tests
      run: |
        pytest -v -m "integration and not docker and not slow" --timeout=240 --log-cli-level=INFO --cov=src/clm --cov-append --cov-report=xml --cov-report=term
      env:
        CLM_ENABLE_TEST_LOGGING: "1"
        CLM_LOG_LEVEL: INFO

    - name: Run E2E tests
      run: |
        pytest -v -m "e2e and not docker and not slow" --timeout=600 --log-cli-level=INFO --cov=src/clm --cov-append --cov-report=xml --cov-report=term
      env:
        CLM_E2E_TIMEOUT: 600  # 10 minutes timeout for E2E tests (allows multi-build tests)
        CLM_ENABLE_TEST_LOGGING: "1"
        CLM_LOG_LEVEL: INFO

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      continue-on-error: true
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
      if: matrix.python-version == '3.12'

  lint:
    name: Lint and type check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v8
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        uv pip install --system -e ".[dev,tui,web,notebook,summarize,recordings,slides,mcp]"

    - name: Run ruff check
      run: |
        ruff check src/ tests/

    - name: Run ruff format check
      run: |
        ruff format --check src/ tests/

    - name: Run mypy
      run: |
        mypy src/clm

  docker-test:
    name: Docker Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    # The notebook/plantuml/drawio build inputs (deno, ijava, drawio .deb) are
    # now fetched + SHA-256-verified inside the Dockerfiles, so the only LFS
    # object the image builds need is the small drawio font.
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        lfs: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build notebook-processor:lite-test Docker image
      run: |
        docker build \
          -f docker/notebook/Dockerfile \
          --build-arg VARIANT=lite \
          --build-arg DOCKER_PATH=docker/notebook \
          -t clm-notebook-processor:lite-test \
          .

    - name: Build plantuml-converter:test Docker image
      run: |
        docker build \
          -f docker/plantuml/Dockerfile \
          --build-arg DOCKER_PATH=docker/plantuml \
          -t clm-plantuml-converter:test \
          .

    - name: Build drawio-converter:test Docker image
      run: |
        docker build \
          -f docker/drawio/Dockerfile \
          --build-arg DOCKER_PATH=docker/drawio \
          -t clm-drawio-converter:test \
          .

    - name: Install uv
      uses: astral-sh/setup-uv@v8
      with:
        version: "latest"

    - name: Install dependencies
      run: |
        # Install all dependencies except ML (PyTorch, FastAI, etc.) which aren't needed for tests
        uv pip install --system -e ".[all-workers,recordings,dev,tui,web]"

    - name: Run Docker integration tests
      run: |
        pytest -v -n0 -m "docker" --timeout=600 --log-cli-level=INFO
      env:
        CLM_E2E_TIMEOUT: 600
        CLM_ENABLE_TEST_LOGGING: "1"
        CLM_LOG_LEVEL: INFO
