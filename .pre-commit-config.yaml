# Pre-commit hooks configuration
# See https://pre-commit.com for more information
# Install: pip install pre-commit && pre-commit install
# Or with uv: uv add pre-commit --dev && uv run pre-commit install

repos:
  # Ruff - Fast Python linter and formatter
  # Uses local ruff to match the version in the project's virtual environment
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        # Only check src/ and tests/, not test-data/ or other directories
        files: ^(src|tests)/
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format
        language: system
        types: [python]
        files: ^(src|tests)/

  # Mypy - Static type checker
  # Uses local mypy via system to respect pyproject.toml settings
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        # Only check src/clm, not tests (matches existing behavior)
        files: ^src/clm/
        # Don't pass filenames - check entire src/clm directory
        pass_filenames: false
        args: [src/clm]

  # Fast test suite (~30s) - runs default (non-slow) tests in parallel.
  # Invoked via scripts/run_pytest_hook.py which clears leaking GIT_*
  # env vars before spawning pytest — see docs/proposals/
  # PRE_COMMIT_HOOK_HARDENING.md (Fix 2) for the reason this wrapper is
  # needed. always_run is false so docs-only commits don't pay the 30s
  # cost (Fix 4).
  - repo: local
    hooks:
      - id: pytest
        name: pytest (fast)
        entry: python scripts/run_pytest_hook.py -q --tb=line
        language: system
        # Only run when source or test files change
        files: ^(src|tests)/
        types: [python]
        pass_filenames: false
        always_run: false

  # Drift check: pyproject.toml [tool.uv].exclude-newer must match the
  # date prefix of uv.lock [options].exclude-newer. When they disagree,
  # 'uv run' silently re-locks the working tree on the next invocation.
  # Only fires when one of those two files is staged.
  - repo: local
    hooks:
      - id: check-exclude-newer
        name: check uv exclude-newer drift
        entry: python scripts/check_exclude_newer.py
        language: system
        files: ^(pyproject\.toml|uv\.lock)$
        pass_filenames: false
